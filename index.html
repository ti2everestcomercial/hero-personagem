<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de Heróis</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #000080; 
            --text-color: #00ff00; 
            --border-color: #00ff00;
            --highlight-color: #ff00ff;
            --card-bg: #000000;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                              radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
        }

        h1 {
            color: #ffff00;
            text-shadow: 2px 2px 0px #ff0000;
            text-align: center;
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 3px solid var(--border-color);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        .card:hover, .card.selected {
            border-color: var(--highlight-color);
            box-shadow: 3px 3px 0px var(--highlight-color);
            transform: translate(-2px, -2px);
            color: var(--highlight-color);
        }

        .details-panel {
            background-color: var(--card-bg);
            border: 3px dashed var(--highlight-color);
            padding: 20px;
            width: 95%;
            max-width: 500px;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .details-panel.active { display: flex; animation: fadeIn 0.3s ease-out; }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff0000;
            color: #fff;
            padding: 5px 10px;
            font-size: 0.6rem;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .hero-name { color: #ffff00; font-size: 1rem; margin-bottom: 8px; text-decoration: underline; }
        .hero-skill { color: var(--highlight-color); font-size: 0.6rem; margin-bottom: 12px; font-style: italic; }
        .hero-lore { font-size: 0.75rem; line-height: 1.6; color: #ffffff; text-align: left; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .cursor-blink::after { content: '█'; animation: blink 1s step-end infinite; color: var(--highlight-color); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h1>CONHEÇA SEU<br>LUTADOR</h1>

    <div class="cards-container" id="cards-container">
        <div class="card" onclick="selectHero('galadriel', event)"><div class="text-2xl mb-2">🧝‍♀️</div><div class="text-[9px]">Duda</div></div>
        <div class="card" onclick="selectHero('barbarian', event)"><div class="text-2xl mb-2">🪓</div><div class="text-[9px]">Rafão</div></div>
        <div class="card" onclick="selectHero('wizard', event)"><div class="text-2xl mb-2">🧙‍♂️</div><div class="text-[9px]">Gabi</div></div>
        <div class="card" onclick="selectHero('rogue', event)"><div class="text-2xl mb-2">🗡️</div><div class="text-[9px]">Valadão</div></div>
        <div class="card" onclick="selectHero('marcela', event)"><div class="text-2xl mb-2">🔥</div><div class="text-[9px]">Marcela</div></div>
        <div class="card" onclick="selectHero('regianne', event)"><div class="text-2xl mb-2">🤠</div><div class="text-[9px]">Regianne</div></div>
        <div class="card" onclick="selectHero('eliane', event)"><div class="text-2xl mb-2">👑</div><div class="text-[9px]">Eliane</div></div>
        <div class="card" onclick="selectHero('shirliane', event)"><div class="text-2xl mb-2">☀️</div><div class="text-[9px]">Shirliane</div></div>
        <div class="card" onclick="selectHero('maria', event)"><div class="text-2xl mb-2">🏋️‍♀️</div><div class="text-[9px]">Maria</div></div>
        <div class="card" onclick="selectHero('carla', event)"><div class="text-2xl mb-2">👟</div><div class="text-[9px]">Carla</div></div>
        <div class="card" onclick="selectHero('layla', event)"><div class="text-2xl mb-2">🌟</div><div class="text-[9px]">Layla</div></div>
        <div class="card" onclick="selectHero('bruna', event)"><div class="text-2xl mb-2">🤱</div><div class="text-[9px]">Bruna</div></div>
        <div class="card" onclick="selectHero('jackeline', event)"><div class="text-2xl mb-2">🎸</div><div class="text-[9px]">Jackeline</div></div>
        <div class="card" onclick="selectHero('isabelli', event)"><div class="text-2xl mb-2">🤧</div><div class="text-[9px]">Isabelli</div></div>
        <div class="card" onclick="selectHero('kathleen', event)"><div class="text-2xl mb-2">💃</div><div class="text-[9px]">Kathleen</div></div>
        <div class="card" onclick="selectHero('larissao', event)"><div class="text-2xl mb-2">🎤</div><div class="text-[9px]">Larissão</div></div>
        <div class="card" onclick="selectHero('mika', event)"><div class="text-2xl mb-2">🎂</div><div class="text-[9px]">Mika</div></div>
        <div class="card" onclick="selectHero('gisele', event)"><div class="text-2xl mb-2">🛡️</div><div class="text-[9px]">Gisele</div></div>
        <div class="card" onclick="selectHero('thaynara', event)"><div class="text-2xl mb-2">💭</div><div class="text-[9px]">Thaynara</div></div>
        <div class="card" onclick="selectHero('leticia', event)"><div class="text-2xl mb-2">🤪</div><div class="text-[9px]">Letícia</div></div>
        <div class="card" onclick="selectHero('geovanna', event)"><div class="text-2xl mb-2">📏</div><div class="text-[9px]">Geovanna</div></div>
        <div class="card" onclick="selectHero('tamiris', event)"><div class="text-2xl mb-2">💃</div><div class="text-[9px]">Tamiris</div></div>
        <div class="card" onclick="selectHero('rychard', event)"><div class="text-2xl mb-2">🔒</div><div class="text-[9px]">Sr. Rychard</div></div>
    </div>

    <div id="details-panel" class="details-panel">
        <button class="close-btn" onclick="closeDetails()">X</button>
        <div id="hero-name" class="hero-name"></div>
        <div id="hero-skill" class="hero-skill"></div>
        <div id="hero-lore" class="hero-lore">
            <span id="lore-text"></span><span class="cursor-blink"></span>
        </div>
    </div>

    <script>
        const heroes = {
            galadriel: { name: "Duda", skill: "Habilidade: Criatividade", lore: `Tão velha quanto o próprio tempo… mas sem aparentar um dia a mais — dizem que o segredo é um hidratante absurdamente caro e um pacto suspeito com a juventude. Dona de olhares fulminantes capazes de fazer até orcs repensarem suas escolhas de vida. Mentalmente? Uma incógnita. Vive tendo conversas tão aleatórias que até ela mesma se perde no assunto. E claro, não consegue passar 3 segundos sem passar as mãos no cabelo, como se estivesse em um comercial de shampoo.` },
            barbarian: { name: "Rafão", skill: "Habilidade: Super Protetor, Cachaceiro & Mãos de Seda", lore: `Resolve tudo na machadada. Se alguém chegar perto dos amigos, ele vira o Hulk — mas se tiver uma gelada por perto, esquece até o nome do vilão. O segredo de todo o seu poder emana diretamente daquela barba de lenhador: se a barba falhar, ele vira um gatinho domesticado.

Mas por trás da aparência de bruto existe um homem refinado… dono de uma coleção suspeitamente grande de cremes para as mãos. Porque não basta esmagar problemas na força: as mãos precisam estar hidratadas, macias e prontas pra próxima machadada` },
            wizard: { name: "Gabi", skill: "Habilidade: Desastre", lore: `Passou anos estudando as mais complexas magias arcanas, decifrando grimórios antigos e acumulando conhecimento digno dos maiores magos da história. O problema é que, apesar de toda a teoria, ainda consegue tropeçar no próprio manto durante uma entrada triunfal.

Se tentar conjurar uma bola de fogo, há grandes chances de o feitiço atingir a própria mochila antes de alcançar o alvo. Entre explosões inesperadas, encantamentos duvidosos e uma quantidade preocupante de acidentes mágicos, ela prova diariamente que magia não é uma ciência exata — é um estado permanente de caos.

Mas por trás de toda essa atrapalhação existe uma pessoa incrível. Dona de um cabelo estiloso que parece ter sido encantado para ficar sempre bonito, ela é extremamente tranquila, daquelas que raramente se abalam e conseguem transmitir calma para quem está por perto. E, acima de tudo, possui um coração enorme, sempre pronta para ajudar, ouvir e acolher quem precisa. Afinal, mesmo que os feitiços nem sempre saiam como planejado, sua bondade nunca falha.` },
            rogue: { name: "Valadão", skill: "Habilidade: Galã do Cavanhaque", lore: `Mestre da furtividade, exceto quando precisa manter a postura para as fotos. Seu charme vem diretamente do cavanhaque milagroso. Seus bolsos são cheios de perfumes importados e corações roubados.` },
            marcela: { name: "Marcela", skill: "Habilidade: Sempre Certa", lore: `Se a Marcela diz que 2+2 é 5, por favor, não discuta — economize seu tempo. O sangue de Áries corre em suas veias como uma cafeína pura e ela bate o pé até a razão ser dela.` },
            regianne: { name: "Regianne", skill: "Habilidade: Mutação de Grau & Cerveja", lore: `Uma criatura que transita entre a enxada e o asfalto. Ela fala um dialeto que só ela entende — meio roceira, meio urbana. Mas atenção: o óculos dela é o verdadeiro limitador de poder. De óculos, parece uma moça comportada. Tirou os óculos? Sai da frente, porque a transformação é nível épico e se tiver uma gelada na mesa, ela se acaba.` },
            eliane: { name: "Eliane", skill: "Habilidade: Chefe da Gangue Risonha e Sombria", lore: `A líder suprema do terror com alma de comediante. Fascinada por assuntos macabros e crimes reais, ela te conta um caso horripilante enquanto morre de rir. Mas não se engane: a aura sombria é apenas o aquecimento. Basta uma dose e a bicha vira a própria entidade da festa, gargalhando sem parar e espalhando um caos risonho tão intenso que você não sabe se chama um exorcista ou mais uma rodada de bebidas.` },
            shirliane: { name: "Shirliane", skill: "Habilidade: Sem Frescura", lore: `Pernambucana raiz, do tipo que não leva desaforo para casa. Se o plano dá errado, ela resolve na base do "oxente" e do improviso. Frescura aqui é palavra proibida.` },
            maria: { name: "Maria", skill: "Habilidade: Fitness de Bagaceira", lore: `Maranhense de alma, ela jura de pé junto que é fitness, mas a verdade é que seu metabolismo só funciona à base de pura bagaceira. O domingo dela não tem treino, tem cachaça e love — e ai de quem disser que isso não conta como cardio!` },
            carla: { name: "Carla", skill: "Habilidade: Estilo Palmeirense", lore: `Palmeirense roxa, ou melhor, verde. Pode cair o mundo, mas se o Palmeiras está no peito, ela está plena. O segredo da sua paz inabalável não é meditação, é a confiança inabalável no seu pisante de luxo e na sua camisa oficial. O Palmeiras pode até não ter Mundial, mas o estilo da Carla é campeão absoluto.` },
            layla: { name: "Layla", skill: "Habilidade: Menina Solta", lore: `Uma 'menina solta' de espírito, sua vida é um eterno rolê preparatório para o grande sonho: o BBB. Ela já tem até o discurso de eliminação ensaiado no espelho do banheiro. Se você a encontrar em uma festa, não se engane: ela não está apenas curtindo, ela está em plena campanha eleitoral pela vaga na casa mais vigiada do Brasil.` },
            bruna: { name: "Bruna", skill: "Habilidade: Mãe Observadora", lore: `A observadora silenciosa do grupo. Ela mantém uma calma que beira o sobrenatural, observando o caos dos outros com a serenidade de quem já viu de tudo e não se abala. Mas cuidado: é a força de uma mãe leoa. Pode parecer que está apenas ali curtindo a brisa, mas ela é a guerreira que resolve qualquer problema (e limpa a bagunça) com um olhar e uma dose de paciência infinita.` },
            jackeline: { name: "Jackeline", skill: "Habilidade: Gigantismo e Rock", lore: `Uma roqueira sinistra com uma bondade sem tamanho. Jackeline faz questão de que todos olhem para cima para conversar com ela, mas seu coração é tão grande quanto a própria altura.

À primeira vista, passa a imagem de alguém que vive ao som de muito metal pesado, riffs destrutivos e vocais capazes de invocar criaturas de outra dimensão. Mas, lá no fundo, todos sabemos a verdade: houve uma época em que ela já foi emo, provavelmente decorava letras dramáticas e, em algum momento da vida, considerou seriamente usar aquelas roupas coloridas do Restart. Talvez ela negue, talvez tente apagar as evidências, mas a lenda permanece viva.` },
            isabelli: { name: "Isabelli", skill: "Habilidade: Espirro Infinito", lore: `Doida de um jeito que não tem medo do perigo — e, às vezes, parece não ter muito apreço pelas leis de trânsito. Atravessa avenidas no meio dos carros com a confiança del.



No dia a dia, dedica horas de treinamento ao aperfeiçoamento de sua habilidade mais rara: os espirros em sequência. Um único espirro é apenas o aquecimento; a verdadeira apresentação começa quando ela engata uma sequência tão longa que ninguém sabe ao certo quando termina. Há quem diga que já perdeu reuniões inteiras esperando o último espirro chegar.` },
            kathleen: { name: "Kathleen", skill: "Habilidade: Mãezona Estilosa", lore: `Criatura rara de cabelos vermelhos, tão vibrantes quanto a batida de um set de eletrônica. É a prova viva que dá pra ser mãe e se divertir. Mas não se iluda pela simpatia: com seus conhecimentos de hardware, ela já destruiu peças importantes de companheiros em ataques de fúria vingativa.` },
            larissao: { name: "Larissão", skill: "Habilidade: Voz de Superação", lore: `Com uma voz marcante e uma presença forte, ela é a própria definição de superação. Quem a vê hoje dificilmente imagina as batalhas que precisou enfrentar ao longo do caminho. Cada desafio contribuiu para formar a pessoa determinada e resiliente que é hoje.

Atualmente, encontra sua maior força nos pilares que sustentam sua caminhada: a família, os amigos e, claro, seu negão. São eles que a motivam a seguir em frente, crescer a cada dia e transformar novos objetivos em conquistas.` },
            mika: { name: "Mika", skill: "Habilidade: Mestra do Cuscuz", lore: `Uma pessoa incrível e extremamente sentimental. Se você ganhou um bolo ou um cuscuz da Mika, saiba que recebeu um pedaço do seu coração em forma de comida.` },
            gisele: { name: "Gisele", skill: "Habilidade: Apoio Incondicional", lore: `Uma verdadeira guerreira, daquelas que enfrentaram batalhas capazes de derrubar titãs e, ainda assim, seguiram em frente de cabeça erguida. Sua força não está apenas na capacidade de superar desafios, mas também na determinação com que encara cada novo obstáculo.

Sempre pronta para estender a mão e apoiar suas companheiras, ela é o alicerce e o braço forte do grupo. Quando as coisas ficam difíceis, é nela que todos encontram firmeza, coragem e a certeza de que ninguém precisa enfrentar nada sozinho.` },
            thaynara: { name: "Thaynara", skill: "Habilidade: Novos Sonhos", lore: `Dona de uma personalidade forte, repleta de ambições e grandes sonhos, ela está sempre em busca de novos objetivos e desafios. Dizem que agora é uma "nova mulher": deixou para trás antigos vícios, mantém o foco no futuro e segue determinada a construir a vida que deseja.

Uma verdadeira força da natureza, daquelas que não se intimidam facilmente e que transformam obstáculos em combustível para seguir em frente. Entre seus muitos planos, existe um que ocupa um lugar especial no coração: o sonho de construir uma família e, quem sabe, subir ao altar para celebrar uma nova etapa da vida.` },
            leticia: { name: "Letícia", skill: "Habilidade: Coração Mole", lore: `Brincalhona, sorridente e dona de uma energia que parece não ter fim. Está sempre pronta para uma piada, uma conversa aleatória ou alguma ideia que surge do nada e acaba arrancando risadas de todo mundo.

Por trás de toda essa bagunça organizada existe alguém extremamente dedicada, que coloca empenho, carinho e dedicação em tudo o que faz. E embora tente manter a pose de vez em quando, todos sabem que seu verdadeiro ponto fraco é o afeto. No fundo, ela tem um coração mole daqueles que se apegam às pessoas e valorizam cada gesto de carinho` },
            geovanna: { name: "Geovanna", skill: "Habilidade: Estilo Compacto", lore: `Não se engane pelo tamanho: essa baixinha é extremamente esperta, estilosa e brincalhona. Dona de uma personalidade gigante, ela transforma qualquer ambiente com sua energia contagiante e seu jeito divertido. Pequena no tamanho, mas enorme no carisma` },
            tamiris: { name: "Tamiris", skill: "Habilidade: Forrozeira Arretada", lore: `Arretada e apaixonada por forró, a Tamiris é a alma da festa. Com um bom coração, ela anima qualquer lugar por onde passa.` },
            rychard: { name: "Sr. Rychard", skill: "Habilidade: Guardião do Segredo", lore: `ACESSO NEGADO! Este perfil só é visível para almas puras, de bom coração e que estão 100% livres da cachaça. Parece que você ainda não atingiu esse nível de iluminação... ou talvez precise visitar mais amigos da turma! (Visite todos os cards para liberar o segredo!)` }
        };

        let typeWriterInterval;
        const visitedHeroes = new Set();
        const totalHeroesCount = 22; // Exclude Rychard

        function selectHero(heroId, event) {
            document.querySelectorAll('.card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');

            if (heroId !== 'rychard') {
                visitedHeroes.add(heroId);
                if (visitedHeroes.size === totalHeroesCount) {
                    heroes.rychard.lore = `PARABÉNS! Você revelou o segredo do Sr. Rychard! Ele revela: "Não é exatamente um segredo, mas sim um agradecimento.

Fico muito feliz por ter conhecido cada um de vocês ao longo dessa caminhada. Sou grato por todos os momentos compartilhados, pelas conversas, pelas risadas e por tudo o que aprendemos juntos. Cada pessoa deixou sua marca de alguma forma, e levarei essas lembranças comigo com muito carinho.

Uma nova oportunidade surgiu e chegou a hora de seguir um novo caminho. Embora os nossos trajetos agora possam ser diferentes, saibam que guardarei com apreço tudo o que vivemos e cada amizade que construí aqui.

Obrigado por fazerem parte dessa história."`;
                }
            }

            const hero = heroes[heroId];
            const panel = document.getElementById('details-panel');
            panel.classList.add('active');
            
            document.getElementById('hero-name').innerText = hero.name;
            document.getElementById('hero-skill').innerText = hero.skill;
            
            const loreTextElement = document.getElementById('lore-text');
            loreTextElement.innerText = '';
            
            if (typeWriterInterval) clearInterval(typeWriterInterval);

            let i = 0;
            typeWriterInterval = setInterval(() => {
                if (i < hero.lore.length) {
                    loreTextElement.innerText += hero.lore.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriterInterval);
                }
            }, 10);
        }

        function closeDetails() {
            document.getElementById('details-panel').classList.remove('active');
            if (typeWriterInterval) clearInterval(typeWriterInterval);
        }
    </script>
</body>
</html>
