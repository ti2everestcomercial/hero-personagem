<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de Heróis Retrô</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #000080; 
            --text-color: #00ff00; 
            --border-color: #00ff00;
            --highlight-color: #ff00ff;
            --card-bg: #000000;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        h1 {
            color: #ffff00;
            text-shadow: 2px 2px 0px #ff0000;
            text-align: center;
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 3px solid var(--border-color);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        .card:hover, .card.selected {
            border-color: var(--highlight-color);
            box-shadow: 3px 3px 0px var(--highlight-color);
            transform: translate(-2px, -2px);
            color: var(--highlight-color);
        }

        .details-panel {
            background-color: var(--card-bg);
            border: 3px dashed var(--highlight-color);
            padding: 20px;
            width: 95%;
            max-width: 500px;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .details-panel.active { display: flex; animation: fadeIn 0.3s ease-out; }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff0000;
            color: #fff;
            padding: 5px 10px;
            font-size: 0.6rem;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .hero-name { color: #ffff00; font-size: 1rem; margin-bottom: 8px; text-decoration: underline; }
        .hero-skill { color: var(--highlight-color); font-size: 0.6rem; margin-bottom: 12px; font-style: italic; }
        .hero-lore { font-size: 0.75rem; line-height: 1.6; color: #ffffff; text-align: left; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .cursor-blink::after { content: '█'; animation: blink 1s step-end infinite; color: var(--highlight-color); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

    <h1>CONHEÇA SEU<br>LUTADOR</h1>

    <div class="cards-container" id="cards-container">
        <!-- Heroes will be injected or kept here -->
        <div class="card" onclick="selectHero('galadriel', event)"><div class="text-2xl mb-2">🧝‍♀️</div><div class="text-[9px]">Duda</div></div>
        <div class="card" onclick="selectHero('barbarian', event)"><div class="text-2xl mb-2">🪓</div><div class="text-[9px]">Rafão</div></div>
        <div class="card" onclick="selectHero('wizard', event)"><div class="text-2xl mb-2">🧙‍♂️</div><div class="text-[9px]">Gabi</div></div>
        <div class="card" onclick="selectHero('rogue', event)"><div class="text-2xl mb-2">🗡️</div><div class="text-[9px]">Valadão</div></div>
        <div class="card" onclick="selectHero('marcela', event)"><div class="text-2xl mb-2">🔥</div><div class="text-[9px]">Marcela</div></div>
        <div class="card" onclick="selectHero('regianne', event)"><div class="text-2xl mb-2">🤠</div><div class="text-[9px]">Regianne</div></div>
        <div class="card" onclick="selectHero('eliane', event)"><div class="text-2xl mb-2">👑</div><div class="text-[9px]">Eliane</div></div>
        <div class="card" onclick="selectHero('shirliane', event)"><div class="text-2xl mb-2">☀️</div><div class="text-[9px]">Shirliane</div></div>
        <div class="card" onclick="selectHero('maria', event)"><div class="text-2xl mb-2">🏋️‍♀️</div><div class="text-[9px]">Maria</div></div>
        <div class="card" onclick="selectHero('carla', event)"><div class="text-2xl mb-2">👟</div><div class="text-[9px]">Carla</div></div>
        <div class="card" onclick="selectHero('layla', event)"><div class="text-2xl mb-2">🌟</div><div class="text-[9px]">Layla</div></div>
        <div class="card" onclick="selectHero('bruna', event)"><div class="text-2xl mb-2">🤱</div><div class="text-[9px]">Bruna</div></div>
        <div class="card" onclick="selectHero('jackeline', event)"><div class="text-2xl mb-2">🎸</div><div class="text-[9px]">Jackeline</div></div>
        <div class="card" onclick="selectHero('isabelli', event)"><div class="text-2xl mb-2">🤧</div><div class="text-[9px]">Isabelli</div></div>
        <div class="card" onclick="selectHero('kathleen', event)"><div class="text-2xl mb-2">💃</div><div class="text-[9px]">Kathleen</div></div>
        <div class="card" onclick="selectHero('larissao', event)"><div class="text-2xl mb-2">🎤</div><div class="text-[9px]">Larissão</div></div>
        <div class="card" onclick="selectHero('rychard', event)"><div class="text-2xl mb-2">🔒</div><div class="text-[9px]">Sr. Rychard</div></div>
    </div>

    <div id="details-panel" class="details-panel">
        <button class="close-btn" onclick="closeDetails()">X</button>
        <div id="hero-name" class="hero-name"></div>
        <div id="hero-skill" class="hero-skill"></div>
        <div id="hero-lore" class="hero-lore">
            <span id="lore-text"></span><span class="cursor-blink"></span>
        </div>
    </div>

    <script>
        const heroes = {
            galadriel: { name: "Duda", skill: "Habilidade: Criatividade", lore: `Tão velha quanto o próprio tempo… mas sem aparentar um dia a mais — dizem que o segredo é um hidratante absurdamente caro e um pacto suspeito com a juventude. Dona de olhares fulminantes capazes de fazer até orcs repensarem suas escolhas de vida.` },
            barbarian: { name: "Rafão", skill: "Habilidade: Protetor", lore: `Inteligência: Resolve tudo na machadada. Se alguém chegar perto dos amigos, ele vira o Hulk — mas se tiver uma gelada por perto, esquece até o nome do vilão. O segredo de todo o seu poder emana diretamente daquela barba de lenhador.` },
            wizard: { name: "Gabi", skill: "Habilidade: Desastre", lore: `Passou anos estudando magias arcanas, mas tropeça no próprio manto. Se ela tenta lançar uma bola de fogo, provavelmente acaba incendiando a própria mochila.` },
            rogue: { name: "Valadão", skill: "Habilidade: Charme", lore: `Mestre da furtividade, exceto quando precisa manter a postura para as fotos. Especialista em roubar corações com um simples olhar.` },
            marcela: { name: "Marcela", skill: "Habilidade: Sempre Certa", lore: `Se a Marcela diz que 2+2 é 5, por favor, não discuta — economize seu tempo. O sangue de Áries corre nas veias dela como uma cafeína pura.` },
            regianne: { name: "Regianne", skill: "Habilidade: Mutação de Grau & Cerveja", lore: `Uma criatura que transita entre a enxada e o asfalto. Ela fala um dialeto que só ela entende — meio roceira, meio urbana.` },
            eliane: { name: "Eliane", skill: "Habilidade: Chefe da Gangue Risonha", lore: `A líder suprema do terror com alma de comediante. Fascinada por assuntos macabros e crimes reais, ela te conta um caso horripilante enquanto morre de rir.` },
            shirliane: { name: "Shirliane", skill: "Habilidade: Sem Frescura", lore: `Pernambucana raiz, do tipo que não leva desaforo para casa e muito menos frescura. Se o plano dá errado, ela resolve na base do "oxente" e do improviso.` },
            maria: { name: "Maria", skill: "Habilidade: Bagaceira", lore: `Maranhense de alma, ela jura de pé junto que é fitness, mas a verdade é que seu metabolismo só funciona à base de pura bagaceira.` },
            carla: { name: "Carla", skill: "Habilidade: Estilo", lore: `Palmeirense roxa, ou melhor, verde. Pode cair o mundo, mas se o Palmeiras está no peito, ela está plena. O segredo da sua paz inabalável não é meditação, é a confiança inabalável no seu pisante de luxo.` },
            layla: { name: "Layla", skill: "Habilidade: Menina Solta", lore: `Uma 'menina solta' de espírito, sua vida é um eterno rolê preparatório para o grande sonho: o BBB. Ela já tem até o discurso de eliminação ensaiado no espelho do banheiro.` },
            bruna: { name: "Bruna", skill: "Habilidade: Mãe", lore: `A observadora silenciosa do grupo. Ela mantém uma calma que beira o sobrenatural, observando o caos dos outros com a serenidade de quem já viu de tudo.` },
            jackeline: { name: "Jackeline", skill: "Habilidade: Gigantismo", lore: `Jackeline é a prova viva de que tamanho é documento e bondade é virtude. Com uma altura que exige que os meros mortais usem um binóculo para falar com ela, ela domina qualquer ambiente.` },
            isabelli: { name: "Isabelli", skill: "Habilidade: Espirro", lore: `Não conhece o medo — e, aparentemente, nem as leis de trânsito. Atravessa avenidas movimentadas entre os carros como se estivesse num jogo de videogame.` },
            kathleen: { name: "Kathleen", skill: "Habilidade: Mãezona Estilosa", lore: `Uma criatura rara de cabelos vermelhos, tão vibrantes quanto a batida de um set de eletrônica. É a prova viva que da pra ser mãe e ao mesmo tempo se divertir.` },
            larissao: { name: "Larissão", skill: "Habilidade: Voz Empoderada", lore: `A personificação da serenidade, mas não se engane: essa calmaria é blindada. Larissão é um verdadeiro exemplo de superação, tendo navegado pelas tempestades mais pesadas.` },
            rychard: { name: "Sr. Rychard", skill: "Habilidade: Guardião do Segredo", lore: `ACESSO NEGADO! Este perfil só é visível para almas puras. Parece que você ainda não atingiu esse nível de iluminação... brincadeiras a parte. Para desbloquear passe pelas histórias de todos os personagens` }
        };

        let typeWriterInterval;
        const visitedHeroes = new Set();
        const totalHeroesCount = 16; // Exclude Rychard

        function selectHero(heroId, event) {
            document.querySelectorAll('.card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');

            if (heroId !== 'rychard') {
                visitedHeroes.add(heroId);
                if (visitedHeroes.size === totalHeroesCount) {
                    heroes.rychard.lore = `PARABÉNS! Você revelou o segredo do Sr. Rychard! Ele revela: "Não é bem um segredo, mas fico muito feliz por ter conhecido cada um ao longo dessa caminhada. Sou grato pelos momentos, pelas conversas e pelas risadas. Uma nova oportunidade surgiu e vou seguir um novo caminho, mas levo cada um de vocês comigo."`;
                }
            }

            const hero = heroes[heroId];
            const panel = document.getElementById('details-panel');
            panel.classList.add('active');
            
            document.getElementById('hero-name').innerText = hero.name;
            document.getElementById('hero-skill').innerText = hero.skill;
            
            const loreTextElement = document.getElementById('lore-text');
            loreTextElement.innerText = '';
            
            if (typeWriterInterval) clearInterval(typeWriterInterval);

            let i = 0;
            typeWriterInterval = setInterval(() => {
                if (i < hero.lore.length) {
                    loreTextElement.innerText += hero.lore.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriterInterval);
                }
            }, 10);
        }

        function closeDetails() {
            document.getElementById('details-panel').classList.remove('active');
            if (typeWriterInterval) clearInterval(typeWriterInterval);
        }
    </script>
</body>
</html>
