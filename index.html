<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de Heróis Retrô</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #000080; 
            --text-color: #00ff00; 
            --border-color: #00ff00;
            --highlight-color: #ff00ff;
            --card-bg: #000000;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        h1 {
            color: #ffff00;
            text-shadow: 2px 2px 0px #ff0000;
            text-align: center;
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 3px solid var(--border-color);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        .card:hover, .card.selected {
            border-color: var(--highlight-color);
            box-shadow: 3px 3px 0px var(--highlight-color);
            transform: translate(-2px, -2px);
            color: var(--highlight-color);
        }

        .details-panel {
            background-color: var(--card-bg);
            border: 3px dashed var(--highlight-color);
            padding: 20px;
            width: 95%;
            max-width: 500px;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .details-panel.active { display: flex; animation: fadeIn 0.3s ease-out; }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff0000;
            color: #fff;
            padding: 5px 10px;
            font-size: 0.6rem;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .hero-name { color: #ffff00; font-size: 1rem; margin-bottom: 8px; text-decoration: underline; }
        .hero-skill { color: var(--highlight-color); font-size: 0.6rem; margin-bottom: 12px; font-style: italic; }
        .hero-lore { font-size: 0.75rem; line-height: 1.6; color: #ffffff; text-align: left; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .cursor-blink::after { content: '█'; animation: blink 1s step-end infinite; color: var(--highlight-color); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

    <h1>CONHEÇA SEU<br>LUTADOR</h1>

    <div class="cards-container">
        <div class="card" onclick="selectHero('galadriel')"><div class="text-2xl mb-2">🧝‍♀️</div><div class="text-[9px]">Duda</div></div>
        <div class="card" onclick="selectHero('barbarian')"><div class="text-2xl mb-2">🪓</div><div class="text-[9px]">Rafão</div></div>
        <div class="card" onclick="selectHero('wizard')"><div class="text-2xl mb-2">🧙‍♂️</div><div class="text-[9px]">Gabi</div></div>
        <div class="card" onclick="selectHero('rogue')"><div class="text-2xl mb-2">🗡️</div><div class="text-[9px]">Valadão</div></div>
        <div class="card" onclick="selectHero('marcela')"><div class="text-2xl mb-2">🔥</div><div class="text-[9px]">Marcela</div></div>
        <div class="card" onclick="selectHero('regianne')"><div class="text-2xl mb-2">🤠</div><div class="text-[9px]">Regianne</div></div>
        <div class="card" onclick="selectHero('eliane')"><div class="text-2xl mb-2">👑</div><div class="text-[9px]">Eliane</div></div>
        <div class="card" onclick="selectHero('shirliane')"><div class="text-2xl mb-2">☀️</div><div class="text-[9px]">Shirliane</div></div>
        <div class="card" onclick="selectHero('maria')"><div class="text-2xl mb-2">🏋️‍♀️</div><div class="text-[9px]">Maria</div></div>
        <div class="card" onclick="selectHero('carla')"><div class="text-2xl mb-2">👟</div><div class="text-[9px]">Carla</div></div>
        <div class="card" onclick="selectHero('layla')"><div class="text-2xl mb-2">🌟</div><div class="text-[9px]">Layla</div></div>
        <div class="card" onclick="selectHero('bruna')"><div class="text-2xl mb-2">🤱</div><div class="text-[9px]">Bruna</div></div>
        <div class="card" onclick="selectHero('jackeline')"><div class="text-2xl mb-2">🎸</div><div class="text-[9px]">Jackeline</div></div>
        <div class="card" onclick="selectHero('isabelli')"><div class="text-2xl mb-2">🤧</div><div class="text-[9px]">Isabelli</div></div>
        <div class="card" onclick="selectHero('kathleen')"><div class="text-2xl mb-2">💃</div><div class="text-[9px]">Kathleen</div></div>
        <div class="card" onclick="selectHero('larissao')"><div class="text-2xl mb-2">🎤</div><div class="text-[9px]">Larissão</div></div>
        <div class="card" onclick="selectHero('rychard')"><div class="text-2xl mb-2">🔒</div><div class="text-[9px]">Sr. Rychard</div></div>
    </div>

    <div id="details-panel" class="details-panel">
        <button class="close-btn" onclick="closeDetails()">X</button>
        <div id="hero-name" class="hero-name"></div>
        <div id="hero-skill" class="hero-skill"></div>
        <div id="hero-lore" class="hero-lore">
            <span id="lore-text"></span><span class="cursor-blink"></span>
        </div>
    </div>

    <script>
        const heroes = {
            galadriel: {
                name: "Duda",
                skill: "Habilidade: Criatividade",
                lore: `Tão velha quanto o próprio tempo… mas sem aparentar um dia a mais — dizem que o segredo é um hidratante absurdamente caro e um pacto suspeito com a juventude. Dona de olhares fulminantes capazes de fazer até orcs repensarem suas escolhas de vida. Mentalmente? Uma incógnita. Vive tendo conversas tão aleatórias que até ela mesma se perde no assunto. E claro, não consegue passar 3 segundos sem passar as mãos no cabelo, como se estivesse em um comercial de shampoo.`
            },
            barbarian: {
                name: "Rafão",
                skill: "Habilidade: Protetor",
                lore: `Inteligência: Resolve tudo na machadada. Se alguém chegar perto dos amigos, ele vira o Hulk — mas se tiver uma gelada por perto, esquece até o nome do vilão. O segredo de todo o seu poder emana diretamente daquela barba de lenhador: se a barba falhar, ele vira um gatinho domesticado.

Mas por trás da aparência de bruto existe um homem refinado… dono de uma coleção suspeitamente grande de cremes para as mãos. Porque não basta esmagar problemas na força: as mãos precisam estar hidratadas, macias e prontas pra próxima machadada. Dizem até que ele coloca mais creme do que gasolina no carro.`
            },
            wizard: {
                name: "Gabi",
                skill: "Habilidade: Desastre",
                lore: `Passou anos estudando magias arcanas, mas tropeça no próprio manto. Se ela tenta lançar uma bola de fogo, provavelmente acaba incendiando a própria mochila. Magia é um estado de caos e ela é a soberana.`
            },
            rogue: {
                name: "Valadão",
                skill: "Habilidade: Charme",
                lore: `Mestre da furtividade, exceto quando precisa manter a postura para as fotos. Especialista em roubar corações com um simples olhar. Seus bolsos são cheios de charme, perfumes importados e a verdadeira fonte de tudo: seu cavanhaque impecavelmente desenhado, de onde emana todo o seu magnetismo.`
            },
            marcela: {
                name: "Marcela",
                skill: "Habilidade: Sempre Certa",
                lore: `Se a Marcela diz que 2+2 é 5, por favor, não discuta — economize seu tempo. O sangue de Áries corre nas veias dela como uma cafeína pura. Ela bate o pé com tanta força que o chão treme, e se ela diz que algo aconteceu de um jeito, é lei. Convencer a Marcela do contrário? Mais fácil ensinar um peixe a andar de bicicleta.`
            },
            regianne: {
                name: "Regianne",
                skill: "Habilidade: Mutação de Grau & Cerveja",
                lore: `Uma criatura que transita entre a enxada e o asfalto. Ela fala um dialeto que só ela entende — meio roceira, meio urbana. Mas atenção: o óculos dela é o verdadeiro limitador de poder. De óculos, parece uma moça comportada. Tirou os óculos? Sai da frente, porque a transformação é nível épico e se tiver uma gelada na mesa, ela se acaba.`
            },
            eliane: {
                name: "Eliane",
                skill: "Habilidade: Chefe da Gangue Risonha",
                lore: `A líder suprema do terror com alma de comediante. Fascinada por assuntos macabros e crimes reais, ela te conta um caso horripilante enquanto morre de rir. Mas não se engane: a aura sombria é apenas o aquecimento. Basta uma dose e a bicha vira a própria entidade da festa, gargalhando sem parar e espalhando um caos risonho tão intenso que você não sabe se chama um exorcista ou mais uma rodada de bebidas.`
            },
            shirliane: {
                name: "Shirliane",
                skill: "Habilidade: Sem Frescura",
                lore: `Pernambucana raiz, do tipo que não leva desaforo para casa e muito menos frescura. Se o plano dá errado, ela resolve na base do "oxente" e do improviso. É a cola que mantém o grupo unido, mesmo que para isso precise dar um ou dois gritos. Com ela não tem meio termo: é oito ou oitenta!`
            },
            maria: {
                name: "Maria",
                skill: "Habilidade: Bagaceira)",
                lore: `Maranhense de alma, ela jura de pé junto que é fitness, mas a verdade é que seu metabolismo só funciona à base de pura bagaceira. O domingo dela não tem treino, tem cachaça e love — e ai de quem disser que isso não conta como cardio!`
            },
            carla: {
                name: "Carla",
                skill: "Habilidade: Estilo",
                lore: `Palmeirense roxa, ou melhor, verde. Pode cair o mundo, mas se o Palmeiras está no peito, ela está plena. O segredo da sua paz inabalável não é meditação, é a confiança inabalável no seu pisante de luxo e na sua camisa oficial. O Palmeiras pode até não ter Mundial, mas o estilo da Carla é campeão absoluto.`
            },
            layla: {
                name: "Layla",
                skill: "Habilidade: Menina Solta",
                lore: `Uma 'menina solta' de espírito, sua vida é um eterno rolê preparatório para o grande sonho: o BBB. Ela já tem até o discurso de eliminação ensaiado no espelho do banheiro. Se você a encontrar em uma festa, não se engane: ela não está apenas curtindo, ela está em plena campanha eleitoral pela vaga na casa mais vigiada do Brasil.`
            },
            bruna: {
                name: "Bruna",
                skill: "Habilidade: Mãe",
                lore: `A observadora silenciosa do grupo. Ela mantém uma calma que beira o sobrenatural, observando o caos dos outros com a serenidade de quem já viu de tudo e não se abala. Mas cuidado: é a força de uma mãe leoa. Pode parecer que está apenas ali curtindo a brisa, mas ela é a guerreira que resolve qualquer problema (e limpa a bagunça) com um olhar e uma dose de paciência infinita.`
            },
            jackeline: {
                name: "Jackeline",
                skill: "Habilidade: Gigantismo (A Rainha do Rock)",
                lore: `Jackeline é a prova viva de que tamanho é documento e bondade é virtude. Com uma altura que exige que os meros mortais usem um binóculo para falar com ela, ela domina qualquer ambiente com sua presença épica. Quando não está sendo a pessoa mais doce e gentil do mundo, ela se transforma numa roqueira sinistra, com um gosto musical tão pesado quanto sua presença. É o combo perfeito: coração gigante e atitude rock'n'roll que faz qualquer um olhar para cima e reverenciar.`
            },
            isabelli: {
                name: "Isabelli",
                skill: "Habilidade: Espirro",
                lore: `Não conhece o medo — e, aparentemente, nem as leis de trânsito. Atravessa avenidas movimentadas entre os carros como se estivesse num jogo de videogame na vida real. Mas sua verdadeira arma secreta é o espirro: quando ela começa, é uma metralhadora de "atchim" que não tem fim. Se ouvir um, corra, porque a sequência é imparável!`
            },
            kathleen: {
            name: "Kathleen",
            skill: "Habilidade: Mãezona Estilosa",
            lore: `Uma criatura rara de cabelos vermelhos, tão vibrantes quanto a batida de um set de eletrônica. É a prova viva que da pra ser mãe e ao mesmo tempo se divertir. Mas não se iluda pela sua expressão simpatica. Pois também consegue ser bem vingativa quando necessário, com conhecimentos em hardwares ja destruiu peças importantes de seu companheiro. Todo cuidado é pouco`
        },
            larissao: {
                name: "Larissão",
                skill: "Habilidade: Voz Empoderada",
                lore: `A personificação da serenidade, mas não se engane: essa calmaria é blindada. Larissão é um verdadeiro exemplo de superação, tendo navegado pelas tempestades mais pesadas para encontrar seu porto seguro. Hoje, ela exala uma paz que desconcerta e uma voz grave e forte que impõe respeito — quem vê esse sorriso de quem tem a vida resolvida nem imagina o livro de memórias que ela carrega nas costas. Ela não apenas sobreviveu; ela virou o jogo e aprendeu a dar risada do caos. E, claro, nada disso seria completo sem o seu porto seguro: sua familia, amigos e seu negão.`
            },
            rychard: {
                name: "Sr. Rychard",
                skill: "Habilidade: Guardião do Segredo",
                lore: `ACESSO NEGADO! Este perfil só é visível para almas puras, de bom coração e que estão 100% livres da cachaça. Parece que você ainda não atingiu esse nível de iluminação... ou talvez tenha bebido demais hoje!`
            }
        };

        let typeWriterInterval;

        function selectHero(heroId) {
            document.querySelectorAll('.card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');

            const hero = heroes[heroId];
            const panel = document.getElementById('details-panel');
            panel.classList.add('active');
            
            document.getElementById('hero-name').innerText = hero.name;
            document.getElementById('hero-skill').innerText = hero.skill;
            
            const loreTextElement = document.getElementById('lore-text');
            loreTextElement.innerText = '';
            
            if (typeWriterInterval) clearInterval(typeWriterInterval);

            // Special logic for locked character
            if (heroId === 'rychard') {
                loreTextElement.innerHTML = hero.lore;
                return;
            }

            let i = 0;
            typeWriterInterval = setInterval(() => {
                if (i < hero.lore.length) {
                    loreTextElement.innerHTML += hero.lore.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriterInterval);
                }
            }, 10);
        }

        function closeDetails() {
            document.getElementById('details-panel').classList.remove('active');
            document.querySelectorAll('.card').forEach(card => card.classList.remove('selected'));
            if (typeWriterInterval) clearInterval(typeWriterInterval);
        }
    </script>
</body>
</html>
